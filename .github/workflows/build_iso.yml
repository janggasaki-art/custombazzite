```yaml id="f0u4zd"
name: Stable Gaming ISO Builder

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: custom-bazzite
  REGISTRY: ghcr.io

jobs:

  build-image:
    runs-on: ubuntu-latest

    steps:

      - name: Cleanup Runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          podman system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt update

          sudo apt install -y \
            podman \
            skopeo \
            curl \
            wget \
            git

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          podman login ghcr.io \
          -u "${{ github.actor }}" \
          --password-stdin

      - name: Create Containerfile
        run: |
          cat > Containerfile << 'EOF'
          FROM ghcr.io/ublue-os/bazzite:stable

          RUN rpm-ostree install \
              mangohud \
              gamescope \
              gamemode \
              vkbasalt \
              steam-devices \
              fastfetch \
              htop \
              git \
              curl \
              wget \
              vim \
              nano

          RUN flatpak remote-add --if-not-exists flathub \
              https://flathub.org/repo/flathub.flatpakrepo

          RUN flatpak install -y flathub \
              com.discordapp.Discord \
              com.obsproject.Studio \
              org.videolan.VLC \
              org.mozilla.firefox

          RUN mkdir -p /etc/systemd/system/getty@tty1.service.d

          RUN printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin bazzite --noclear %%I $TERM\n' \
          > /etc/systemd/system/getty@tty1.service.d/override.conf

          RUN systemctl enable bluetooth || true
          RUN systemctl enable podman.socket || true

          EOF

      - name: Build Image
        run: |
          podman build \
            --storage-driver=vfs \
            --pull=newer \
            -t ghcr.io/${{ github.repository_owner }}/custom-bazzite:latest \
            .

      - name: Push Image
        run: |
          podman push \
            ghcr.io/${{ github.repository_owner }}/custom-bazzite:latest

  build-iso:
    needs: build-image
    runs-on: ubuntu-latest

    steps:

      - name: Cleanup Runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/.ghcup
          docker system prune -af || true
          podman system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        id: build
        uses: jasonn3/build-container-installer@v1.2.4

        with:
          arch: x86_64

          image_name: custom-bazzite
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest

          version: 41
          variant: Kinoite

          iso_name: custom-bazzite.iso

          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"

      - name: Prepare Upload
        run: |
          mkdir upload

          find "${{ steps.build.outputs.iso_path }}" -name "*.iso" -exec mv {} upload/ \;

          find "${{ steps.build.outputs.iso_path }}" -name "*CHECKSUM*" -exec mv {} upload/ \; || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4

        with:
          name: custom-bazzite-iso
          path: upload
          overwrite: true
          compression-level: 0
```
