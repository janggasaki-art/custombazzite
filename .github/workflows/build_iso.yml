```yaml id="v8m2qs"
name: Ultimate Custom Bazzite ISO

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: custom-bazzite
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:

  build-image:
    runs-on: ubuntu-latest

    steps:

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af || true
          df -h

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            podman \
            skopeo \
            curl \
            wget \
            git

      - name: Login To GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          podman login ghcr.io \
          -u ${{ github.actor }} \
          --password-stdin

      - name: Create Containerfile
        run: |
          cat > Containerfile << 'EOF'
          FROM ghcr.io/ublue-os/bazzite-gnome:stable

          RUN rpm-ostree install \
              mangohud \
              gamescope \
              vkbasalt \
              gamemode \
              steam-devices \
              goverlay \
              lact \
              coolercontrol \
              wget \
              curl \
              git \
              vim \
              nano \
              fastfetch \
              htop

          RUN mkdir -p /etc/systemd/system/getty@tty1.service.d

          RUN printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin bazzite --noclear %%I $TERM\n' \
              > /etc/systemd/system/getty@tty1.service.d/override.conf

          RUN systemctl enable podman.socket
          RUN systemctl enable bluetooth
          RUN systemctl enable cups
          RUN systemctl enable sshd

          RUN flatpak remote-add --if-not-exists flathub \
              https://flathub.org/repo/flathub.flatpakrepo

          RUN flatpak install -y flathub \
              com.discordapp.Discord \
              com.obsproject.Studio \
              org.videolan.VLC \
              com.usebottles.bottles \
              io.github.mimbrero.WhatsAppDesktop \
              org.mozilla.firefox \
              com.spotify.Client

          RUN mkdir -p /usr/share/backgrounds/custom

          RUN echo "Custom Bazzite Build"

          EOF

      - name: Build Custom Image
        run: |
          podman build \
            --pull=newer \
            -t ghcr.io/${{ github.repository_owner }}/custom-bazzite:latest \
            .

      - name: Push Image
        run: |
          podman push \
            ghcr.io/${{ github.repository_owner }}/custom-bazzite:latest

  build-iso:
    needs: build-image
    runs-on: ubuntu-latest

    steps:

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af || true
          df -h

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build ISO
        id: build
        uses: jasonn3/build-container-installer@v1.2.4

        with:
          arch: x86_64

          image_name: custom-bazzite
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest

          version: 41
          variant: Kinoite

          iso_name: custom-bazzite-gaming.iso

          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"

          enrollment_password: universalblue

      - name: Prepare Upload
        run: |
          mkdir upload

          mv \
          ${{ steps.build.outputs.iso_path }}/*.iso \
          upload/

          mv \
          ${{ steps.build.outputs.iso_path }}/*CHECKSUM \
          upload/ || true

      - name: Upload ISO
        uses: actions/upload-artifact@v4

        with:
          name: custom-bazzite-gaming-iso
          path: upload
          compression-level: 0
          overwrite: true
```
