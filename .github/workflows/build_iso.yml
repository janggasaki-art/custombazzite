```yaml
name: Build ISOs

on:
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-iso
  cancel-in-progress: true

jobs:
  build-iso:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        image_name:
          - bazzite-gnome
        major_version: [41]

    steps:

      # 저장공간 확보
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Aggressive Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo docker system prune -af || true
          df -h

      # 레포 체크아웃
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 태그 설정
      - name: Set Image Tag
        id: generate-tag
        shell: bash
        run: |
          TAG="latest"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # Flatpak 디렉토리
      - name: Set Flatpaks Directory Shortname
        id: generate-flatpak-dir-shortname
        shell: bash
        run: |
          FLATPAK_DIR_SHORTNAME="installer/gnome_flatpaks"
          echo "flatpak-dir-shortname=${FLATPAK_DIR_SHORTNAME}" >> $GITHUB_OUTPUT

      # registry lowercase
      - name: Lowercase Registry
        id: registry_case
        shell: bash
        run: |
          echo "lowercase=$(echo '${{ env.IMAGE_REGISTRY }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # podman/docker 설치
      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            docker.io \
            podman \
            curl \
            jq

          sudo systemctl start docker

      # 이미지 존재 확인
      - name: Check Image Exists
        run: |
          IMAGE="${{ steps.registry_case.outputs.lowercase }}/${{ matrix.image_name }}:${{ steps.generate-tag.outputs.tag }}"

          echo "Checking image:"
          echo "$IMAGE"

          docker pull "$IMAGE"

      # Bazzite Repo
      - name: Setup Bazzite Repo
        run: |
          curl -Lo ${{ github.workspace }}/bazzite.repo \
          https://copr.fedorainfracloud.org/coprs/bazzite-org/bazzite/repo/fedora-${{ matrix.major_version }}/bazzite-org-bazzite-fedora-${{ matrix.major_version }}.repo

      # ISO 빌드
      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.4
        id: build

        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ${{ steps.registry_case.outputs.lowercase }}
          variant: Kinoite
          version: ${{ matrix.major_version }}
          image_tag: ${{ steps.generate-tag.outputs.tag }}

          iso_name: custom-bazzite.iso

          secure_boot_key_url: '${{ github.server_url }}/${{ github.repository }}/raw/main/secure_boot.der'

          enrollment_password: universalblue

          enable_cache_dnf: "false"
          enable_cache_skopeo: "false"

          flatpak_remote_refs_dir: ${{ steps.generate-flatpak-dir-shortname.outputs.flatpak-dir-shortname }}

          enable_flatpak_dependencies: "false"

          additional_templates: >
            /github/workspace/installer/lorax_templates/remove_root_password_prompt.tmpl
            /github/workspace/installer/lorax_templates/set_default_user.tmpl

          repos: >
            /github/workspace/bazzite.repo
            /etc/yum.repos.d/fedora.repo
            /etc/yum.repos.d/fedora-updates.repo

      # 업로드 디렉토리 생성
      - name: Prepare Upload
        run: |
          mkdir upload

          mv \
          ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }} \
          upload/

          mv \
          ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM \
          upload/

      # ISO 업로드
      - name: Upload ISO
        uses: actions/upload-artifact@v4

        with:
          name: custom-bazzite-iso
          path: upload
          compression-level: 0
          overwrite: true
```
